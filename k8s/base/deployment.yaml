apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackers-organized
  labels:
    app: hackers-organized
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hackers-organized
  template:
    metadata:
      name: hackers-organized
      labels:
        app: hackers-organized
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hackers-organized
          image: ldonleycb/hackers-organized
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: ho-cm
          ports:
            - containerPort: 80
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
